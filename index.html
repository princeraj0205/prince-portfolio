<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PRINCE RAJ | HACKER PORTFOLIO</title>

<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Share Tech Mono',monospace;
}

body{
background:#000;
color:#00ff00;
overflow:hidden;
}

canvas{
position:fixed;
top:0;
left:0;
z-index:-1;
}

.nav{
position:fixed;
top:20px;
width:100%;
text-align:center;
}

.nav button{
padding:12px 25px;
margin:5px;
background:#000;
border:2px solid #00ff00;
color:#00ff00;
cursor:pointer;
}

.nav button:hover{
background:#00ff00;
color:#000;
}

.page{
display:none;
padding:120px 50px;
height:100vh;
overflow:auto;
}

.active{
display:block;
}

#loader{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#000;
display:none;
justify-content:center;
align-items:center;
flex-direction:column;
z-index:9999;
}

.bar{
width:400px;
height:20px;
border:2px solid #00ff00;
margin-top:20px;
}

.progress{
height:100%;
width:0%;
background:#00ff00;
}

input,textarea{
width:100%;
padding:10px;
margin:10px 0;
background:#000;
border:2px solid #00ff00;
color:#00ff00;
}

</style>
</head>
<body>

<audio id="hackSound">
<source src="hacker.mp3" type="audio/mpeg">
</audio>

<canvas id="matrix"></canvas>

<div class="nav">
<button onclick="openPage('home')">HOME</button>
<button onclick="openPage('about')">ABOUT</button>
<button onclick="openPage('gallery')">GALLERY</button>
<button onclick="openPage('contact')">CONTACT</button>
</div>

<div id="loader">
<h1>ACCESSING DATABASE...</h1>
<div class="bar">
<div class="progress" id="progress"></div>
</div>
</div>

<div id="home" class="page active">
<h1>> WELCOME PRINCE RAJ</h1>
<p>System Online...</p>
</div>

<div id="about" class="page">
<h1>> ABOUT</h1>
<p>Add your bio here.</p>
</div>

<div id="gallery" class="page">
<h1>> GALLERY</h1>
<p>Add photos and videos here.</p>
</div>

<div id="contact" class="page">
<h1>> CONTACT TERMINAL</h1>

<form>
<input type="text" placeholder="ENTER NAME">
<input type="email" placeholder="ENTER EMAIL">
<textarea placeholder="MESSAGE"></textarea>
<button type="submit">SEND</button>
</form>

</div>

<script>

// Matrix Rain
const canvas=document.getElementById("matrix");
const ctx=canvas.getContext("2d");

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

const chars="ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789";
const drops=[];

for(let i=0;i<300;i++) drops[i]=1;

function draw(){

ctx.fillStyle="rgba(0,0,0,0.05)";
ctx.fillRect(0,0,canvas.width,canvas.height);

ctx.fillStyle="#00ff00";

for(let i=0;i<drops.length;i++){

const text=chars[Math.floor(Math.random()*chars.length)];

ctx.fillText(text,i*15,drops[i]*15);

if(drops[i]*15>canvas.height)
drops[i]=0;

drops[i]++;

}

}

setInterval(draw,35);

// Page Loader
function openPage(id){

document.getElementById("loader").style.display="flex";

const audio=document.getElementById("hackSound");
audio.currentTime=0;
audio.play().catch(()=>{});

let p=0;

const progress=document.getElementById("progress");

const run=setInterval(()=>{

p+=2;

progress.style.width=p+"%";

if(p>=100){

clearInterval(run);

document.getElementById("loader").style.display="none";

document
.querySelectorAll(".page")
.forEach(x=>x.classList.remove("active"));

document
.getElementById(id)
.classList.add("active");

progress.style.width="0%";

}

},40);

}

</script>

</body>
</html>
